          format: uuid
        cronExpression:
          type: string
        timezone:
          type: string
        exportFormat:
          type: string
          enum: [pdf, excel, csv]
          default: excel
        exportOptions:
          $ref: '#/components/schemas/ExportOptions'
        parameters:
          type: object
        recipients:
          type: array
          items:
            type: string
            format: email
        webhookUrl:
          type: string
          format: uri

    UpdateScheduleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        cronExpression:
          type: string
        timezone:
          type: string
        enabled:
          type: boolean
        exportFormat:
          type: string
        exportOptions:
          $ref: '#/components/schemas/ExportOptions'
        parameters:
          type: object
        recipients:
          type: array
          items:
            type: string
            format: email
        webhookUrl:
          type: string
          format: uri

    ExecutionHistory:
      type: object
